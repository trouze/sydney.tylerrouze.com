{% extends "base.html" %}

{% block title %}RSVP{% endblock %}

{% block content %}
<section class="py-24 px-6">
  <div class="max-w-lg mx-auto">

    <div class="text-center mb-16">
      <p class="text-xs tracking-[0.4em] uppercase text-stone-400 mb-5">Join Us</p>
      <h1 class="font-display text-7xl text-stone-800">RSVP</h1>
      <div class="w-12 h-px bg-stone-300 mx-auto mt-10"></div>
      <p class="text-stone-500 text-sm mt-6">Kindly reply by August 1, 2026</p>
    </div>

    <div id="rsvp-form">
      <form
        hx-post="/rsvp"
        hx-target="#rsvp-form"
        hx-swap="outerHTML"
        class="space-y-10"
      >
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Full Name</label>
          <input
            type="text"
            name="name"
            required
            autocomplete="name"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600 transition-colors text-sm"
            placeholder="Your full name"
          />
        </div>

        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Email</label>
          <input
            type="email"
            name="email"
            required
            autocomplete="email"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600 transition-colors text-sm"
            placeholder="your@email.com"
          />
        </div>

        <div>
          <p class="text-xs tracking-widest uppercase text-stone-400 mb-4">Attendance</p>
          <div class="flex gap-10">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="radio" name="attending" value="yes" required class="accent-stone-800 w-4 h-4" />
              <span class="text-sm text-stone-600 group-hover:text-stone-800 transition-colors">Joyfully accepts</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="radio" name="attending" value="no" class="accent-stone-800 w-4 h-4" />
              <span class="text-sm text-stone-600 group-hover:text-stone-800 transition-colors">Regretfully declines</span>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Number of Guests</label>
          <select
            name="guest_count"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-stone-600 focus:outline-none focus:border-stone-600 transition-colors text-sm appearance-none"
          >
            <option value="1">1 — Just me</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Meal Preference</label>
          <select
            name="meal_choice"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-stone-600 focus:outline-none focus:border-stone-600 transition-colors text-sm appearance-none"
          >
            <option value="">Select a meal</option>
            <option value="chicken">Chicken Marsala</option>
            <option value="beef">Beef Tenderloin</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="vegan">Vegan</option>
          </select>
        </div>

        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Dietary Restrictions</label>
          <input
            type="text"
            name="dietary_restrictions"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600 transition-colors text-sm"
            placeholder="Allergies or dietary needs"
          />
        </div>

        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Note to the Couple</label>
          <textarea
            name="message"
            rows="3"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600 transition-colors resize-none text-sm"
            placeholder="Share a message or well wishes..."
          ></textarea>
        </div>

        <div class="pt-4">
          <button
            type="submit"
            class="w-full py-4 text-xs tracking-widest uppercase bg-stone-800 text-white hover:bg-stone-700 transition-colors"
          >
            Send RSVP
          </button>
        </div>
      </form>
    </div>

  </div>
</section>
{% endblock %}
