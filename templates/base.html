<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tyler & Sydney{% endblock %} · Tyler & Sydney Rouze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    .font-display { font-family: 'Cormorant Garamond', serif; }
    body { font-family: 'Montserrat', sans-serif; font-weight: 300; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-stone-50/90 backdrop-blur-sm border-b border-stone-200">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="font-display text-xl tracking-widest text-stone-700">T &amp; S</a>
      <ul class="flex gap-8 text-xs tracking-widest uppercase text-stone-500">
        <li><a href="/" class="hover:text-stone-800 transition-colors">Home</a></li>
        <li><a href="/story" class="hover:text-stone-800 transition-colors">Our Story</a></li>
        <li><a href="/details" class="hover:text-stone-800 transition-colors">Details</a></li>
        <li><a href="/registry" class="hover:text-stone-800 transition-colors">Registry</a></li>
        <li><a href="/rsvp" class="hover:text-stone-800 transition-colors">RSVP</a></li>
      </ul>
    </div>
  </nav>

  <main class="pt-16">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-24 py-10 border-t border-stone-200 text-center">
    <p class="font-display text-lg text-stone-400 italic">Tyler &amp; Sydney Rouze</p>
    <p class="text-xs text-stone-300 tracking-widest uppercase mt-1">Forever &amp; Always</p>
  </footer>

</body>
</html>
