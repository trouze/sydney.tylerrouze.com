{% extends "base.html" %}

{% block title %}Events{% endblock %}

{% block content %}
<section class="py-20 px-6">
  <div class="max-w-4xl mx-auto">

    <div class="flex justify-between items-center mb-2">
      <nav class="flex gap-6 text-xs tracking-widest uppercase">
        <a href="/admin" class="text-stone-400 hover:text-stone-700 transition-colors">Parties</a>
        <a href="/admin/meals" class="text-stone-400 hover:text-stone-700 transition-colors">Meals</a>
        <span class="text-stone-800 border-b border-stone-800 pb-1">Events</span>
        <a href="/admin/analytics" class="text-stone-400 hover:text-stone-700 transition-colors">Analytics</a>
        <a href="/admin/import" class="text-stone-400 hover:text-stone-700 transition-colors">Import</a>
        <a href="/admin/settings" class="text-stone-400 hover:text-stone-700 transition-colors">Settings</a>
      </nav>
      <form method="post" action="/admin/logout">
        <button type="submit"
          class="text-xs tracking-widest uppercase text-stone-400 hover:text-stone-700 transition-colors">
          Log out
        </button>
      </form>
    </div>

    <p class="text-xs tracking-[0.4em] uppercase text-stone-400 mb-4 text-center">Couple Only</p>
    <h1 class="font-display text-6xl text-stone-800 text-center">Events</h1>
    <div class="w-12 h-px bg-stone-300 mx-auto mt-8 mb-16"></div>

    <!-- ============ EVENTS ============ -->
    <div class="space-y-3 mb-8">
      {% for e in events %}
      <form method="post" action="/admin/events" class="border border-stone-200 bg-white p-4 grid sm:grid-cols-2 gap-3">
        <input type="hidden" name="action" value="update" />
        <input type="hidden" name="id" value="{{ e.id }}" />
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-1">Name</label>
          <input type="text" name="name" value="{{ e.name }}" required
            class="w-full border-b border-stone-300 bg-transparent pb-1 text-sm text-stone-800 focus:outline-none focus:border-stone-600" />
        </div>
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-1">Starts At (ISO8601)</label>
          <input type="text" name="starts_at" value="{% if let Some(s) = e.starts_at %}{{ s }}{% endif %}" placeholder="2026-09-19T16:00:00"
            class="w-full border-b border-stone-300 bg-transparent pb-1 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600" />
        </div>
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-1">Location</label>
          <input type="text" name="location" value="{% if let Some(l) = e.location %}{{ l }}{% endif %}"
            class="w-full border-b border-stone-300 bg-transparent pb-1 text-sm text-stone-800 focus:outline-none focus:border-stone-600" />
        </div>
        <div class="flex items-end gap-4">
          <label class="text-sm text-stone-500 flex items-center gap-2">
            <input type="checkbox" name="serves_meal" {% if e.serves_meal %}checked{% endif %} /> Serves meal
          </label>
          <label class="text-sm text-stone-500 flex items-center gap-2">
            Order
            <input type="number" name="sort_order" value="{{ e.sort_order }}"
              class="w-16 border-b border-stone-300 bg-transparent pb-1 text-sm text-stone-800 focus:outline-none focus:border-stone-600" />
          </label>
          <button type="submit"
            class="ml-auto py-2 px-5 text-xs tracking-widest uppercase border border-stone-800 text-stone-800 hover:bg-stone-800 hover:text-white transition-colors">
            Save
          </button>
        </div>
      </form>
      {% endfor %}
    </div>

    <div class="border border-stone-200 bg-stone-50 p-5">
      <h3 class="text-xs tracking-widest uppercase text-stone-500 mb-4">Add an Event</h3>
      <form method="post" action="/admin/events" class="grid sm:grid-cols-2 gap-4">
        <input type="hidden" name="action" value="add" />
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-2">Name</label>
          <input type="text" name="name" required placeholder="Reception"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600" />
        </div>
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-2">Starts At (ISO8601)</label>
          <input type="text" name="starts_at" placeholder="2026-09-19T18:00:00"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600" />
        </div>
        <div>
          <label class="block text-xs tracking-widest uppercase text-stone-400 mb-2">Location</label>
          <input type="text" name="location" placeholder="Schrute Farms"
            class="w-full border-b border-stone-300 bg-transparent pb-2 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600" />
        </div>
        <div class="flex items-end gap-4">
          <label class="text-sm text-stone-500 flex items-center gap-2 pb-2">
            <input type="checkbox" name="serves_meal" /> Serves meal
          </label>
          <label class="text-sm text-stone-500 flex items-center gap-2 pb-2">
            Order
            <input type="number" name="sort_order" value="0"
              class="w-16 border-b border-stone-300 bg-transparent pb-1 text-sm text-stone-800 focus:outline-none focus:border-stone-600" />
          </label>
          <button type="submit"
            class="ml-auto py-3 px-8 text-xs tracking-widest uppercase bg-stone-800 text-white hover:bg-stone-700 transition-colors">
            Add
          </button>
        </div>
      </form>
    </div>

  </div>
</section>
{% endblock %}
