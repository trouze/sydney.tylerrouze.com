{% extends "base.html" %}

{% block title %}Our Story{% endblock %}

{% block content %}
<section class="py-24 px-6">
  <div class="max-w-2xl mx-auto">

    <div class="text-center mb-14">
      <p class="text-xs tracking-[0.4em] uppercase text-stone-400 mb-5">Our Story</p>
      <h1 class="font-display text-7xl text-stone-800">A love worth celebrating</h1>
      <div class="w-12 h-px bg-stone-300 mx-auto mt-10"></div>
    </div>

    <figure class="mb-16">
      <img src="/static/images/couple-1.jpg" alt="Tyler and Sydney"
        class="w-full max-w-md mx-auto aspect-square object-cover rounded-sm shadow-sm" />
    </figure>

    <div class="max-w-xl mx-auto text-center">
      <p class="text-stone-500 leading-relaxed text-sm">
        More to come — check back soon.
      </p>
    </div>

  </div>
</section>
{% endblock %}
