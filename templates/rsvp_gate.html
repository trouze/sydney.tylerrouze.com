{% extends "base.html" %}

{% block title %}RSVP{% endblock %}

{% block content %}
<section class="py-24 px-6">
  <div class="max-w-md mx-auto text-center">

    <p class="text-xs tracking-[0.4em] uppercase text-stone-400 mb-5">Join Us</p>
    <h1 class="font-display text-7xl text-stone-800">RSVP</h1>
    <div class="w-12 h-px bg-stone-300 mx-auto mt-10"></div>

    <p class="text-stone-500 text-sm mt-8 leading-relaxed">
      Scan the QR code on your invitation, or enter the invite code printed
      alongside it to find your party.
    </p>

    {% if let Some(message) = error %}
    <p class="text-sm text-rose-600 mt-6">{{ message }}</p>
    {% endif %}

    <form method="get" action="/rsvp" class="mt-10 space-y-6">
      <div>
        <label class="block text-xs tracking-widest uppercase text-stone-400 mb-3">Invite Code</label>
        <input
          type="text"
          name="code"
          required
          autocomplete="off"
          autocapitalize="characters"
          class="w-full text-center tracking-[0.3em] uppercase border-b border-stone-300 bg-transparent pb-2 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-600 transition-colors text-sm"
          placeholder="SMITH-7Q2"
        />
      </div>
      <button
        type="submit"
        class="w-full py-4 text-xs tracking-widest uppercase bg-stone-800 text-white hover:bg-stone-700 transition-colors"
      >
        Find My Invitation
      </button>
    </form>

  </div>
</section>
{% endblock %}
