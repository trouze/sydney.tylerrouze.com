name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "${{ secrets.VM_NAME }}.exe.xyz" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy binary
        env:
          SSH_OPTS: -o GlobalKnownHostsFile=/dev/null -o UpdateHostKeys=no
          VM: exedev@${{ secrets.VM_NAME }}.exe.xyz
        run: |
          ssh $SSH_OPTS $VM "mkdir -p /home/exedev/sydney.tylerrouze.com/target/release"
          scp $SSH_OPTS target/release/wedding-rsvp \
            $VM:/home/exedev/sydney.tylerrouze.com/target/release/wedding-rsvp

      # Pre-launch only: wipe the DB so sqlx re-runs migrations from scratch.
      # Controlled by the repo variable RESET_DB (Settings -> Secrets and
      # variables -> Actions -> Variables). Set it to 'true' while the schema is
      # still churning; delete it (or set 'false') once the site is live.
      # Safety net: refuses to drop a DB that already holds real RSVP records,
      # even if RESET_DB was accidentally left on.
      - name: Reset database (pre-launch only)
        if: vars.RESET_DB == 'true'
        env:
          SSH_OPTS: -o GlobalKnownHostsFile=/dev/null -o UpdateHostKeys=no
          VM: exedev@${{ secrets.VM_NAME }}.exe.xyz
        run: |
          ssh $SSH_OPTS $VM bash -s <<'EOF'
          set -euo pipefail
          DB=/home/exedev/sydney.tylerrouze.com/data/wedding.db
          if [ ! -f "$DB" ]; then
            echo "No DB present yet; nothing to reset."
            exit 0
          fi
          if ! command -v sqlite3 >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq sqlite3
          fi
          # Count real submissions. Missing table (fresh schema) counts as 0.
          count=$(sqlite3 "$DB" "SELECT count(*) FROM rsvp_history;" 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ]; then
            echo "::error::Refusing to reset: rsvp_history has $count record(s). The site is taking RSVPs -- set RESET_DB to false (or delete the variable)."
            exit 1
          fi
          rm -f "$DB" "$DB-shm" "$DB-wal"
          echo "Database reset (had 0 RSVP records)."
          EOF

      # Consolidated app config. GitHub is the source of truth: this file is
      # rewritten every deploy, so any value not present as a repo Secret/Variable
      # is dropped. Empty values are omitted (the app falls back to its defaults;
      # the listmonk sync stays disabled unless URL+USER+TOKEN are all set).
      # Secrets: ADMIN_TOKEN, LISTMONK_TOKEN. Variables: LISTMONK_URL,
      # LISTMONK_USER, LISTMONK_LIST_ID, and (optional) DATABASE_URL.
      - name: Write environment file
        env:
          SSH_OPTS: -o GlobalKnownHostsFile=/dev/null -o UpdateHostKeys=no
          VM: exedev@${{ secrets.VM_NAME }}.exe.xyz
          ENV_PATH: /home/exedev/sydney.tylerrouze.com/wedding.env
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          LISTMONK_URL: ${{ vars.LISTMONK_URL }}
          LISTMONK_USER: ${{ vars.LISTMONK_USER }}
          LISTMONK_LIST_ID: ${{ vars.LISTMONK_LIST_ID }}
          LISTMONK_TOKEN: ${{ secrets.LISTMONK_TOKEN }}
        run: |
          # Build the file locally (values travel over stdin, not the command
          # line) and write it 0600 on the VM. The `&& printf` lines self-skip
          # when empty; `true` keeps the group's exit 0 under pipefail.
          {
            [ -n "$ADMIN_TOKEN" ]      && printf '%s\n' "ADMIN_TOKEN=$ADMIN_TOKEN"
            [ -n "$DATABASE_URL" ]     && printf '%s\n' "DATABASE_URL=$DATABASE_URL"
            [ -n "$LISTMONK_URL" ]     && printf '%s\n' "LISTMONK_URL=$LISTMONK_URL"
            [ -n "$LISTMONK_USER" ]    && printf '%s\n' "LISTMONK_USER=$LISTMONK_USER"
            [ -n "$LISTMONK_TOKEN" ]   && printf '%s\n' "LISTMONK_TOKEN=$LISTMONK_TOKEN"
            [ -n "$LISTMONK_LIST_ID" ] && printf '%s\n' "LISTMONK_LIST_ID=$LISTMONK_LIST_ID"
            true
          } | ssh $SSH_OPTS $VM "umask 077 && cat > '$ENV_PATH'"

      - name: Restart service
        env:
          SSH_OPTS: -o GlobalKnownHostsFile=/dev/null -o UpdateHostKeys=no
          VM: exedev@${{ secrets.VM_NAME }}.exe.xyz
        run: |
          ssh $SSH_OPTS $VM \
            "sudo systemctl restart wedding && systemctl is-active --quiet wedding && echo 'deployed ok'"
