name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Accept exe.dev VM host keys on first connect
          ssh-keyscan "${{ secrets.VM_NAME }}.exe.xyz" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy binary
        run: |
          scp target/release/wedding-rsvp \
            user@${{ secrets.VM_NAME }}.exe.xyz:~/sydney.tylerrouze.com/target/release/wedding-rsvp

      - name: Restart service
        run: |
          ssh user@${{ secrets.VM_NAME }}.exe.xyz \
            "sudo systemctl restart wedding && systemctl is-active --quiet wedding && echo 'deployed ok'"
